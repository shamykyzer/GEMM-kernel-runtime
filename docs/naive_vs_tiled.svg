<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <pattern id="gridSmall" width="25" height="25" patternUnits="userSpaceOnUse">
      <rect width="25" height="25" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
    <marker id="scanArrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <rect width="940" height="480" rx="16" fill="#0F172A"/>

  <!-- Main title -->
  <text x="470" y="32" text-anchor="middle" fill="#F8FAFC" font-size="19" font-weight="700">Naive vs Tiled GEMM</text>
  <text x="470" y="50" text-anchor="middle" fill="#475569" font-size="11">Same math, same result — smarter memory access pattern yields 8.4× speedup</text>

  <!-- ══════════ LEFT: NAIVE ══════════ -->
  <rect x="20" y="62" width="435" height="358" rx="12" fill="#1A0F0F" fill-opacity="0.3" stroke="#DC2626" stroke-width="1" stroke-opacity="0.2"/>

  <text x="237" y="90" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="700">Naive GEMM</text>
  <rect x="170" y="96" width="135" height="20" rx="4" fill="#7F1D1D"/>
  <text x="237" y="110" text-anchor="middle" fill="#FCA5A5" font-size="10" font-weight="600">one element at a time</text>

  <!-- Matrix A (naive) -->
  <text x="70" y="140" fill="#94A3B8" font-size="11" font-weight="600">Matrix A</text>
  <rect x="70" y="148" width="150" height="150" rx="6" fill="#1E293B" stroke="#334155"/>
  <rect x="70" y="148" width="150" height="150" rx="6" fill="url(#gridSmall)"/>
  <!-- Row highlight -->
  <rect x="70" y="148" width="150" height="25" fill="#EF4444" opacity="0.3"/>
  <line x1="70" y1="160" x2="220" y2="160" stroke="#EF4444" stroke-width="2.5"/>
  <!-- Arrow showing row direction -->
  <text x="145" y="170" text-anchor="middle" fill="#FCA5A5" font-size="9" font-weight="600">→ row (sequential, OK)</text>

  <!-- Matrix B (naive) -->
  <text x="280" y="140" fill="#94A3B8" font-size="11" font-weight="600">Matrix B</text>
  <rect x="280" y="148" width="150" height="150" rx="6" fill="#1E293B" stroke="#334155"/>
  <rect x="280" y="148" width="150" height="150" rx="6" fill="url(#gridSmall)"/>
  <!-- Column highlight (the problem) -->
  <rect x="280" y="148" width="25" height="150" fill="#EF4444" opacity="0.3"/>
  <line x1="292" y1="148" x2="292" y2="298" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="5 3"/>

  <!-- Cache miss explosion markers -->
  <g opacity="0.8">
    <text x="300" y="170" fill="#EF4444" font-size="12">✗</text>
    <text x="300" y="195" fill="#EF4444" font-size="12">✗</text>
    <text x="300" y="220" fill="#EF4444" font-size="12">✗</text>
    <text x="300" y="245" fill="#EF4444" font-size="12">✗</text>
    <text x="300" y="270" fill="#EF4444" font-size="12">✗</text>
    <text x="300" y="292" fill="#EF4444" font-size="12">✗</text>
  </g>

  <text x="292" y="316" text-anchor="middle" fill="#FCA5A5" font-size="10" font-weight="600">↓ column stride = N</text>
  <text x="292" y="330" text-anchor="middle" fill="#FCA5A5" font-size="9">cache line evicted every step</text>

  <!-- Problem callout -->
  <rect x="233" y="192" width="38" height="38" rx="6" fill="#7F1D1D" stroke="#EF4444" stroke-width="1.5"/>
  <text x="252" y="216" text-anchor="middle" fill="#EF4444" font-size="18" font-weight="700">!</text>

  <!-- Naive performance box -->
  <rect x="45" y="345" width="390" height="60" rx="10" fill="#1E293B" stroke="#DC2626" stroke-width="1.5" filter="url(#sh)"/>
  <text x="240" y="369" text-anchor="middle" fill="#FCA5A5" font-size="14" font-weight="700">N=1024: 5454 ms · 0.39 GFLOPS</text>
  <text x="240" y="389" text-anchor="middle" fill="#64748B" font-size="10">B matrix (4 MB) constantly evicted — CPU stalls on memory loads</text>

  <!-- ══════════ DIVIDER ══════════ -->
  <line x1="470" y1="70" x2="470" y2="410" stroke="#334155" stroke-width="1" stroke-dasharray="8 4"/>
  <rect x="453" y="190" width="34" height="24" rx="6" fill="#1E293B" stroke="#334155"/>
  <text x="470" y="207" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="700">vs</text>

  <!-- ══════════ RIGHT: TILED ══════════ -->
  <rect x="485" y="62" width="435" height="358" rx="12" fill="#052E16" fill-opacity="0.2" stroke="#16A34A" stroke-width="1" stroke-opacity="0.2"/>

  <text x="702" y="90" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="700">Tiled GEMM</text>
  <rect x="637" y="96" width="130" height="20" rx="4" fill="#14532D"/>
  <text x="702" y="110" text-anchor="middle" fill="#86EFAC" font-size="10" font-weight="600">block by block in cache</text>

  <!-- Matrix A (tiled) -->
  <text x="530" y="140" fill="#94A3B8" font-size="11" font-weight="600">Matrix A</text>
  <rect x="530" y="148" width="150" height="150" rx="6" fill="#1E293B" stroke="#334155"/>
  <rect x="530" y="148" width="150" height="150" rx="6" fill="url(#gridSmall)"/>
  <!-- Active tile highlight -->
  <rect x="530" y="148" width="50" height="50" rx="3" fill="#22C55E" opacity="0.35" stroke="#22C55E" stroke-width="2"/>
  <text x="555" y="178" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="700">tile</text>
  <!-- Ghost tiles showing future work -->
  <rect x="582" y="148" width="50" height="50" rx="3" fill="none" stroke="#22C55E" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>
  <rect x="530" y="200" width="50" height="50" rx="3" fill="none" stroke="#22C55E" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>

  <!-- Matrix B (tiled) -->
  <text x="740" y="140" fill="#94A3B8" font-size="11" font-weight="600">Matrix B</text>
  <rect x="740" y="148" width="150" height="150" rx="6" fill="#1E293B" stroke="#334155"/>
  <rect x="740" y="148" width="150" height="150" rx="6" fill="url(#gridSmall)"/>
  <!-- Active tile highlight -->
  <rect x="740" y="148" width="50" height="50" rx="3" fill="#22C55E" opacity="0.35" stroke="#22C55E" stroke-width="2"/>
  <text x="765" y="178" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="700">tile</text>
  <rect x="792" y="148" width="50" height="50" rx="3" fill="none" stroke="#22C55E" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>
  <rect x="740" y="200" width="50" height="50" rx="3" fill="none" stroke="#22C55E" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>

  <!-- Cache hit indicators -->
  <g opacity="0.85">
    <text x="700" y="178" fill="#22C55E" font-size="20">✓</text>
    <text x="700" y="200" fill="#86EFAC" font-size="10" font-weight="600">both fit</text>
    <text x="700" y="213" fill="#86EFAC" font-size="10" font-weight="600">in L1!</text>
  </g>

  <!-- Tile math annotation -->
  <rect x="535" y="310" width="190" height="32" rx="6" fill="#052E16" stroke="#22C55E" stroke-width="1" stroke-opacity="0.5"/>
  <text x="630" y="325" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="600">16 × 16 × 4B = 1 KB per tile</text>
  <text x="630" y="337" text-anchor="middle" fill="#4ADE80" font-size="9">L1 = 64 KB → fits 64 tiles</text>

  <!-- Tiled performance box -->
  <rect x="505" y="345" width="390" height="60" rx="10" fill="#1E293B" stroke="#16A34A" stroke-width="1.5" filter="url(#sh)"/>
  <text x="700" y="369" text-anchor="middle" fill="#86EFAC" font-size="14" font-weight="700">N=1024: 646 ms · 3.32 GFLOPS</text>
  <text x="700" y="389" text-anchor="middle" fill="#64748B" font-size="10">8.4× speedup — same math, same result, smarter traversal order</text>

  <!-- ══════════ BOTTOM: Block Size Sweep ══════════ -->
  <rect x="80" y="425" width="780" height="44" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="470" y="443" text-anchor="middle" fill="#CBD5E1" font-size="11" font-weight="700">Block Size Sweet Spot</text>

  <!-- Block size progression -->
  <rect x="118" y="450" width="68" height="16" rx="4" fill="#7F1D1D"/>
  <text x="152" y="462" text-anchor="middle" fill="#FCA5A5" font-size="9" font-weight="600">bs=1</text>
  <text x="198" y="462" fill="#334155" font-size="11">→</text>
  <rect x="212" y="450" width="90" height="16" rx="4" fill="#14532D" stroke="#22C55E" stroke-width="1"/>
  <text x="257" y="462" text-anchor="middle" fill="#86EFAC" font-size="9" font-weight="700">bs=16 ★</text>
  <text x="314" y="462" fill="#334155" font-size="11">→</text>
  <rect x="328" y="450" width="72" height="16" rx="4" fill="#365314"/>
  <text x="364" y="462" text-anchor="middle" fill="#BEF264" font-size="9" font-weight="600">bs=32</text>
  <text x="412" y="462" fill="#334155" font-size="11">→</text>
  <rect x="426" y="450" width="72" height="16" rx="4" fill="#422006"/>
  <text x="462" y="462" text-anchor="middle" fill="#FDBA74" font-size="9" font-weight="600">bs=64</text>
  <text x="510" y="462" fill="#334155" font-size="11">→</text>
  <rect x="524" y="450" width="82" height="16" rx="4" fill="#7F1D1D"/>
  <text x="565" y="462" text-anchor="middle" fill="#FCA5A5" font-size="9" font-weight="600">bs=1024</text>

  <!-- Explanation -->
  <text x="650" y="462" fill="#475569" font-size="9">too small = no reuse · too large = cache overflow</text>
</svg>
