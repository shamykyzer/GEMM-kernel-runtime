<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 230" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="bs" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
    <marker id="pipeArrow" viewBox="0 0 12 10" refX="12" refY="5" markerWidth="8" markerHeight="7" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="940" height="230" rx="16" fill="#0F172A"/>

  <!-- Title -->
  <text x="470" y="30" text-anchor="middle" fill="#F8FAFC" font-size="19" font-weight="700">Benchmark Pipeline</text>
  <text x="470" y="48" text-anchor="middle" fill="#475569" font-size="11">Deterministic, reproducible measurement methodology</text>

  <!-- Step 1: Generate -->
  <g transform="translate(30, 64)">
    <rect width="148" height="110" rx="12" fill="#475569" filter="url(#bs)"/>
    <circle cx="24" cy="22" r="12" fill="rgba(0,0,0,0.3)"/>
    <text x="24" y="27" text-anchor="middle" fill="#CBD5E1" font-size="11" font-weight="800">1</text>
    <text x="82" y="27" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Generate</text>
    <text x="74" y="52" text-anchor="middle" fill="#CBD5E1" font-size="10">Random matrices A, B</text>
    <text x="74" y="68" text-anchor="middle" fill="#CBD5E1" font-size="10">with fixed seed</text>
    <rect x="20" y="80" width="108" height="18" rx="4" fill="rgba(0,0,0,0.3)"/>
    <text x="74" y="93" text-anchor="middle" fill="#94A3B8" font-size="9" font-weight="600">deterministic inputs</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="183" y1="119" x2="212" y2="119" stroke="#475569" stroke-width="2" marker-end="url(#pipeArrow)"/>

  <!-- Step 2: Warmup -->
  <g transform="translate(217, 64)">
    <rect width="148" height="110" rx="12" fill="#EA580C" filter="url(#bs)"/>
    <circle cx="24" cy="22" r="12" fill="rgba(0,0,0,0.3)"/>
    <text x="24" y="27" text-anchor="middle" fill="#FED7AA" font-size="11" font-weight="800">2</text>
    <text x="82" y="27" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Warmup</text>
    <text x="74" y="52" text-anchor="middle" fill="#FED7AA" font-size="10">2 untimed runs</text>
    <rect x="20" y="65" width="108" height="32" rx="4" fill="rgba(0,0,0,0.25)"/>
    <text x="74" y="80" text-anchor="middle" fill="#FDBA74" font-size="9" font-weight="600">stabilize CPU</text>
    <text x="74" y="92" text-anchor="middle" fill="#FDBA74" font-size="9" font-weight="600">frequency scaling</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="370" y1="119" x2="399" y2="119" stroke="#475569" stroke-width="2" marker-end="url(#pipeArrow)"/>

  <!-- Step 3: Measure -->
  <g transform="translate(404, 64)">
    <rect width="148" height="110" rx="12" fill="#16A34A" filter="url(#bs)"/>
    <circle cx="24" cy="22" r="12" fill="rgba(0,0,0,0.3)"/>
    <text x="24" y="27" text-anchor="middle" fill="#BBF7D0" font-size="11" font-weight="800">3</text>
    <text x="82" y="27" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Measure</text>
    <text x="74" y="52" text-anchor="middle" fill="#BBF7D0" font-size="10">5 timed trials</text>
    <rect x="20" y="65" width="108" height="32" rx="4" fill="rgba(0,0,0,0.25)"/>
    <text x="74" y="80" text-anchor="middle" fill="#86EFAC" font-size="9" font-weight="600">high_resolution</text>
    <text x="74" y="92" text-anchor="middle" fill="#86EFAC" font-size="9" font-weight="600">_clock</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="557" y1="119" x2="586" y2="119" stroke="#475569" stroke-width="2" marker-end="url(#pipeArrow)"/>

  <!-- Step 4: Average -->
  <g transform="translate(591, 64)">
    <rect width="148" height="110" rx="12" fill="#2563EB" filter="url(#bs)"/>
    <circle cx="24" cy="22" r="12" fill="rgba(0,0,0,0.3)"/>
    <text x="24" y="27" text-anchor="middle" fill="#BFDBFE" font-size="11" font-weight="800">4</text>
    <text x="82" y="27" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Average</text>
    <text x="74" y="52" text-anchor="middle" fill="#BFDBFE" font-size="10">mean of 5 trials</text>
    <rect x="20" y="65" width="108" height="32" rx="4" fill="rgba(0,0,0,0.25)"/>
    <text x="74" y="80" text-anchor="middle" fill="#93C5FD" font-size="9" font-weight="600">reduce</text>
    <text x="74" y="92" text-anchor="middle" fill="#93C5FD" font-size="9" font-weight="600">variance</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="744" y1="119" x2="773" y2="119" stroke="#475569" stroke-width="2" marker-end="url(#pipeArrow)"/>

  <!-- Step 5: Report -->
  <g transform="translate(778, 64)">
    <rect width="148" height="110" rx="12" fill="#7C3AED" filter="url(#bs)"/>
    <circle cx="24" cy="22" r="12" fill="rgba(0,0,0,0.3)"/>
    <text x="24" y="27" text-anchor="middle" fill="#E9D5FF" font-size="11" font-weight="800">5</text>
    <text x="82" y="27" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Report</text>
    <text x="74" y="52" text-anchor="middle" fill="#E9D5FF" font-size="10">GFLOPS + speedup</text>
    <rect x="12" y="65" width="124" height="32" rx="4" fill="rgba(0,0,0,0.25)"/>
    <text x="74" y="80" text-anchor="middle" fill="#C4B5FD" font-size="9" font-weight="600">2 × N³ / time / 10⁹</text>
    <text x="74" y="92" text-anchor="middle" fill="#C4B5FD" font-size="9" font-weight="600">higher GFLOPS = faster</text>
  </g>

  <!-- Bottom annotation -->
  <rect x="130" y="192" width="680" height="26" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="470" y="210" text-anchor="middle" fill="#94A3B8" font-size="10">Deterministic seeding → reproducible inputs · Warmup → stable CPU clocks · Multiple trials → reduced variance</text>
</svg>
