<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="ts" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="940" height="460" rx="16" fill="#0F172A"/>

  <!-- Title -->
  <text x="470" y="32" text-anchor="middle" fill="#F8FAFC" font-size="19" font-weight="700">Parallel Tile Distribution</text>
  <text x="470" y="52" text-anchor="middle" fill="#475569" font-size="11">OpenMP distributes output tiles across threads — each thread owns distinct tiles, zero synchronization</text>

  <!-- Legend -->
  <g transform="translate(32, 72)">
    <rect width="14" height="14" rx="3" fill="#DC2626"/>
    <text x="20" y="12" fill="#FCA5A5" font-size="10" font-weight="600">Thread 0</text>
    <rect x="95" width="14" height="14" rx="3" fill="#2563EB"/>
    <text x="115" y="12" fill="#93C5FD" font-size="10" font-weight="600">Thread 1</text>
    <rect x="190" width="14" height="14" rx="3" fill="#16A34A"/>
    <text x="210" y="12" fill="#86EFAC" font-size="10" font-weight="600">Thread 2</text>
    <rect x="285" width="14" height="14" rx="3" fill="#CA8A04"/>
    <text x="305" y="12" fill="#FDE047" font-size="10" font-weight="600">Thread 3</text>
  </g>

  <!-- ══════════ Output Matrix C (4×4 tile grid) ══════════ -->
  <text x="215" y="108" text-anchor="middle" fill="#CBD5E1" font-size="13" font-weight="700">Output Matrix C</text>
  <text x="215" y="124" text-anchor="middle" fill="#64748B" font-size="10">each tile = independent work unit, no data races</text>

  <g transform="translate(52, 138)">
    <!-- Row 0 — Thread 0 (red) -->
    <rect x="0" y="0" width="78" height="58" rx="5" fill="#DC2626" opacity="0.65" stroke="#EF4444" stroke-width="1.5"/>
    <text x="39" y="26" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T0</text>
    <text x="39" y="42" text-anchor="middle" fill="#FCA5A5" font-size="9">(0,0)</text>
    <rect x="82" y="0" width="78" height="58" rx="5" fill="#DC2626" opacity="0.65" stroke="#EF4444" stroke-width="1.5"/>
    <text x="121" y="26" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T0</text>
    <text x="121" y="42" text-anchor="middle" fill="#FCA5A5" font-size="9">(0,1)</text>
    <rect x="164" y="0" width="78" height="58" rx="5" fill="#DC2626" opacity="0.65" stroke="#EF4444" stroke-width="1.5"/>
    <text x="203" y="26" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T0</text>
    <text x="203" y="42" text-anchor="middle" fill="#FCA5A5" font-size="9">(0,2)</text>
    <rect x="246" y="0" width="78" height="58" rx="5" fill="#DC2626" opacity="0.65" stroke="#EF4444" stroke-width="1.5"/>
    <text x="285" y="26" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T0</text>
    <text x="285" y="42" text-anchor="middle" fill="#FCA5A5" font-size="9">(0,3)</text>

    <!-- Row 1 — Thread 1 (blue) -->
    <rect x="0" y="62" width="78" height="58" rx="5" fill="#2563EB" opacity="0.65" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="39" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T1</text>
    <text x="39" y="104" text-anchor="middle" fill="#93C5FD" font-size="9">(1,0)</text>
    <rect x="82" y="62" width="78" height="58" rx="5" fill="#2563EB" opacity="0.65" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="121" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T1</text>
    <text x="121" y="104" text-anchor="middle" fill="#93C5FD" font-size="9">(1,1)</text>
    <rect x="164" y="62" width="78" height="58" rx="5" fill="#2563EB" opacity="0.65" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="203" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T1</text>
    <text x="203" y="104" text-anchor="middle" fill="#93C5FD" font-size="9">(1,2)</text>
    <rect x="246" y="62" width="78" height="58" rx="5" fill="#2563EB" opacity="0.65" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="285" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T1</text>
    <text x="285" y="104" text-anchor="middle" fill="#93C5FD" font-size="9">(1,3)</text>

    <!-- Row 2 — Thread 2 (green) -->
    <rect x="0" y="124" width="78" height="58" rx="5" fill="#16A34A" opacity="0.65" stroke="#22C55E" stroke-width="1.5"/>
    <text x="39" y="150" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T2</text>
    <text x="39" y="166" text-anchor="middle" fill="#86EFAC" font-size="9">(2,0)</text>
    <rect x="82" y="124" width="78" height="58" rx="5" fill="#16A34A" opacity="0.65" stroke="#22C55E" stroke-width="1.5"/>
    <text x="121" y="150" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T2</text>
    <text x="121" y="166" text-anchor="middle" fill="#86EFAC" font-size="9">(2,1)</text>
    <rect x="164" y="124" width="78" height="58" rx="5" fill="#16A34A" opacity="0.65" stroke="#22C55E" stroke-width="1.5"/>
    <text x="203" y="150" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T2</text>
    <text x="203" y="166" text-anchor="middle" fill="#86EFAC" font-size="9">(2,2)</text>
    <rect x="246" y="124" width="78" height="58" rx="5" fill="#16A34A" opacity="0.65" stroke="#22C55E" stroke-width="1.5"/>
    <text x="285" y="150" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T2</text>
    <text x="285" y="166" text-anchor="middle" fill="#86EFAC" font-size="9">(2,3)</text>

    <!-- Row 3 — Thread 3 (yellow) -->
    <rect x="0" y="186" width="78" height="58" rx="5" fill="#CA8A04" opacity="0.65" stroke="#EAB308" stroke-width="1.5"/>
    <text x="39" y="212" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T3</text>
    <text x="39" y="228" text-anchor="middle" fill="#FDE047" font-size="9">(3,0)</text>
    <rect x="82" y="186" width="78" height="58" rx="5" fill="#CA8A04" opacity="0.65" stroke="#EAB308" stroke-width="1.5"/>
    <text x="121" y="212" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T3</text>
    <text x="121" y="228" text-anchor="middle" fill="#FDE047" font-size="9">(3,1)</text>
    <rect x="164" y="186" width="78" height="58" rx="5" fill="#CA8A04" opacity="0.65" stroke="#EAB308" stroke-width="1.5"/>
    <text x="203" y="212" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T3</text>
    <text x="203" y="228" text-anchor="middle" fill="#FDE047" font-size="9">(3,2)</text>
    <rect x="246" y="186" width="78" height="58" rx="5" fill="#CA8A04" opacity="0.65" stroke="#EAB308" stroke-width="1.5"/>
    <text x="285" y="212" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">T3</text>
    <text x="285" y="228" text-anchor="middle" fill="#FDE047" font-size="9">(3,3)</text>
  </g>

  <!-- ══════════ Right side: Scaling behavior ══════════ -->
  <g transform="translate(430, 108)">
    <text x="0" y="0" fill="#CBD5E1" font-size="14" font-weight="700">Thread Scaling Behavior</text>

    <!-- Small N panel -->
    <rect x="0" y="18" width="478" height="80" rx="10" fill="#1E293B" stroke="#DC2626" stroke-width="1" stroke-opacity="0.4"/>
    <text x="18" y="42" fill="#FCA5A5" font-size="12" font-weight="700">Small matrices (N=128)</text>
    <text x="18" y="60" fill="#94A3B8" font-size="10">Thread creation overhead dominates compute work.</text>
    <text x="18" y="76" fill="#94A3B8" font-size="10">More threads can actually <tspan fill="#FCA5A5" font-weight="600">hurt</tspan> performance at small N.</text>
    <!-- Mini degradation chart -->
    <g transform="translate(358, 28)">
      <rect width="108" height="58" rx="6" fill="#0F172A" stroke="#1E293B"/>
      <text x="54" y="12" text-anchor="middle" fill="#64748B" font-size="8" font-weight="600">GFLOPS</text>
      <rect x="10" y="18" width="14" height="28" rx="2" fill="#22C55E" opacity="0.85"/>
      <rect x="28" y="23" width="14" height="23" rx="2" fill="#EAB308" opacity="0.85"/>
      <rect x="46" y="28" width="14" height="18" rx="2" fill="#F97316" opacity="0.85"/>
      <rect x="64" y="33" width="14" height="13" rx="2" fill="#EF4444" opacity="0.85"/>
      <rect x="82" y="36" width="14" height="10" rx="2" fill="#DC2626" opacity="0.85"/>
      <text x="54" y="54" text-anchor="middle" fill="#475569" font-size="7">1   2   4   8  16</text>
    </g>

    <!-- Large N panel -->
    <rect x="0" y="110" width="478" height="80" rx="10" fill="#1E293B" stroke="#16A34A" stroke-width="1" stroke-opacity="0.4"/>
    <text x="18" y="134" fill="#86EFAC" font-size="12" font-weight="700">Large matrices (N=1024+)</text>
    <text x="18" y="152" fill="#94A3B8" font-size="10">Compute dominates overhead. <tspan fill="#86EFAC" font-weight="600">Near-linear scaling</tspan></text>
    <text x="18" y="168" fill="#94A3B8" font-size="10">up to hardware thread limit → 46× speedup at 20 threads.</text>
    <!-- Mini scaling chart -->
    <g transform="translate(358, 120)">
      <rect width="108" height="58" rx="6" fill="#0F172A" stroke="#1E293B"/>
      <text x="54" y="12" text-anchor="middle" fill="#64748B" font-size="8" font-weight="600">GFLOPS</text>
      <rect x="10" y="38" width="14" height="8" rx="2" fill="#DC2626" opacity="0.85"/>
      <rect x="28" y="32" width="14" height="14" rx="2" fill="#F97316" opacity="0.85"/>
      <rect x="46" y="24" width="14" height="22" rx="2" fill="#EAB308" opacity="0.85"/>
      <rect x="64" y="18" width="14" height="28" rx="2" fill="#22C55E" opacity="0.85"/>
      <rect x="82" y="16" width="14" height="30" rx="2" fill="#16A34A" opacity="0.85"/>
      <text x="54" y="54" text-anchor="middle" fill="#475569" font-size="7">1   2   4   8  16</text>
    </g>

    <!-- Key insight -->
    <rect x="0" y="204" width="478" height="50" rx="10" fill="#1E1338" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="239" y="226" text-anchor="middle" fill="#C4B5FD" font-size="12" font-weight="700">Key: each thread owns distinct output tiles</text>
    <text x="239" y="244" text-anchor="middle" fill="#94A3B8" font-size="10">No locks · no atomics · no false sharing · embarrassingly parallel</text>
  </g>

  <!-- ══════════ Bottom: OpenMP annotation ══════════ -->
  <rect x="40" y="400" width="860" height="44" rx="10" fill="#1E293B" stroke="#334155"/>
  <text x="470" y="421" text-anchor="middle" fill="#CBD5E1" font-size="11" font-weight="500">
    <tspan fill="#A78BFA" font-weight="700" font-family="'Consolas', 'SF Mono', monospace">#pragma omp parallel for collapse(2)</tspan>
    <tspan fill="#CBD5E1"> distributes the (tile_row, tile_col) iteration space</tspan>
  </text>
  <text x="470" y="438" text-anchor="middle" fill="#64748B" font-size="10">Static scheduling by default · work-stealing scheduler planned for Phase 8</text>
</svg>
