<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="regGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="l1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#84CC16"/>
      <stop offset="100%" stop-color="#65A30D"/>
    </linearGradient>
    <linearGradient id="l2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="l3Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="ramGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="glow" x="-6%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    <marker id="latArrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="940" height="380" rx="16" fill="#0F172A"/>

  <!-- Title -->
  <text x="470" y="35" text-anchor="middle" fill="#F8FAFC" font-size="19" font-weight="700">CPU Memory Hierarchy</text>
  <text x="470" y="54" text-anchor="middle" fill="#475569" font-size="11">Why cache-aware tiling matters — latency grows 300× from registers to DRAM</text>

  <!-- Speed/Size axis labels -->
  <text x="80" y="345" fill="#22C55E" font-size="10" font-weight="700">◀ FASTER · SMALLER</text>
  <text x="730" y="345" fill="#EF4444" font-size="10" font-weight="700">SLOWER · LARGER ▶</text>
  <line x1="80" y1="330" x2="860" y2="330" stroke="#1E293B" stroke-width="2"/>
  <!-- Gradient bar on axis -->
  <linearGradient id="axisGrad" x1="0" y1="0" x2="1" y2="0" xmlns="http://www.w3.org/2000/svg">
    <stop offset="0%" stop-color="#22C55E" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#EF4444" stop-opacity="0.5"/>
  </linearGradient>
  <rect x="80" y="328" width="780" height="4" rx="2" fill="url(#axisGrad)"/>

  <!-- Tiled GEMM bracket annotation -->
  <rect x="107" y="70" width="360" height="18" rx="4" fill="none" stroke="#A3E635" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7"/>
  <text x="287" y="83" text-anchor="middle" fill="#A3E635" font-size="10" font-weight="700">← tiled GEMM keeps working data in this zone →</text>

  <!-- ═══ REGISTERS ═══ -->
  <rect x="70" y="100" width="130" height="210" rx="12" fill="url(#regGrad)" filter="url(#glow)"/>
  <text x="135" y="145" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Registers</text>
  <text x="135" y="175" text-anchor="middle" fill="#BBF7D0" font-size="24" font-weight="800">~0.3 ns</text>
  <text x="135" y="200" text-anchor="middle" fill="#DCFCE7" font-size="11">16 × 256-bit YMM</text>
  <text x="135" y="218" text-anchor="middle" fill="#DCFCE7" font-size="11">(or 32 × ZMM)</text>
  <rect x="95" y="238" width="80" height="22" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="135" y="254" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">512 B</text>
  <text x="135" y="290" text-anchor="middle" fill="#DCFCE7" font-size="9">FMA accumulators</text>
  <text x="135" y="302" text-anchor="middle" fill="#DCFCE7" font-size="9">live here</text>

  <!-- Connector -->
  <line x1="204" y1="205" x2="245" y2="205" stroke="#475569" stroke-width="2" marker-end="url(#latArrow)"/>
  <text x="224" y="197" text-anchor="middle" fill="#64748B" font-size="9" font-weight="600">~1 ns</text>

  <!-- ═══ L1 CACHE ═══ -->
  <rect x="250" y="100" width="145" height="210" rx="12" fill="url(#l1Grad)" filter="url(#glow)"/>
  <text x="322" y="145" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">L1 Cache</text>
  <text x="322" y="175" text-anchor="middle" fill="#ECFCCB" font-size="24" font-weight="800">~1 ns</text>
  <text x="322" y="200" text-anchor="middle" fill="#F7FEE7" font-size="11">4 cycles</text>
  <rect x="277" y="218" width="90" height="22" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="322" y="234" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">64 KB</text>
  <rect x="270" y="254" width="105" height="32" rx="5" fill="rgba(0,0,0,0.25)" stroke="#A3E635" stroke-width="1" stroke-opacity="0.5"/>
  <text x="322" y="271" text-anchor="middle" fill="#D9F99D" font-size="10" font-weight="600">16×16 tile = 1 KB</text>
  <text x="322" y="283" text-anchor="middle" fill="#D9F99D" font-size="9">fits 64 tiles!</text>
  <text x="322" y="302" text-anchor="middle" fill="#F7FEE7" font-size="9">sweet spot for bs=16</text>

  <!-- Connector -->
  <line x1="399" y1="205" x2="440" y2="205" stroke="#475569" stroke-width="2" marker-end="url(#latArrow)"/>
  <text x="419" y="197" text-anchor="middle" fill="#64748B" font-size="9" font-weight="600">~3 ns</text>

  <!-- ═══ L2 CACHE ═══ -->
  <rect x="445" y="100" width="145" height="210" rx="12" fill="url(#l2Grad)" filter="url(#glow)"/>
  <text x="517" y="145" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">L2 Cache</text>
  <text x="517" y="175" text-anchor="middle" fill="#FEF3C7" font-size="24" font-weight="800">~3 ns</text>
  <text x="517" y="200" text-anchor="middle" fill="#FEF9C3" font-size="11">12 cycles</text>
  <rect x="472" y="218" width="90" height="22" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="517" y="234" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">256 KB</text>
  <text x="517" y="266" text-anchor="middle" fill="#FEF9C3" font-size="10">bs=32 tile fits</text>
  <text x="517" y="282" text-anchor="middle" fill="#FEF9C3" font-size="10">(32×32 = 4 KB)</text>
  <text x="517" y="302" text-anchor="middle" fill="#FEF9C3" font-size="9">still good perf</text>

  <!-- Connector -->
  <line x1="594" y1="205" x2="635" y2="205" stroke="#475569" stroke-width="2" marker-end="url(#latArrow)"/>
  <text x="614" y="197" text-anchor="middle" fill="#64748B" font-size="9" font-weight="600">~10 ns</text>

  <!-- ═══ L3 CACHE ═══ -->
  <rect x="640" y="100" width="130" height="210" rx="12" fill="url(#l3Grad)" filter="url(#glow)"/>
  <text x="705" y="145" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">L3 Cache</text>
  <text x="705" y="175" text-anchor="middle" fill="#FED7AA" font-size="24" font-weight="800">~10 ns</text>
  <text x="705" y="200" text-anchor="middle" fill="#FFEDD5" font-size="11">40 cycles</text>
  <rect x="665" y="218" width="80" height="22" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="705" y="234" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">8 MB</text>
  <text x="705" y="266" text-anchor="middle" fill="#FFEDD5" font-size="10">shared across</text>
  <text x="705" y="282" text-anchor="middle" fill="#FFEDD5" font-size="10">all cores</text>

  <!-- Connector -->
  <line x1="774" y1="205" x2="815" y2="205" stroke="#475569" stroke-width="2" marker-end="url(#latArrow)"/>
  <text x="794" y="197" text-anchor="middle" fill="#64748B" font-size="9" font-weight="600">~100 ns</text>

  <!-- ═══ DRAM ═══ -->
  <rect x="820" y="100" width="100" height="210" rx="12" fill="url(#ramGrad)" filter="url(#glow)"/>
  <text x="870" y="145" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">DRAM</text>
  <text x="870" y="175" text-anchor="middle" fill="#FECACA" font-size="22" font-weight="800">~100 ns</text>
  <text x="870" y="200" text-anchor="middle" fill="#FEE2E2" font-size="11">400 cycles</text>
  <rect x="837" y="218" width="66" height="22" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="870" y="234" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">16+ GB</text>
  <text x="870" y="266" text-anchor="middle" fill="#FEE2E2" font-size="10">naive GEMM</text>
  <text x="870" y="282" text-anchor="middle" fill="#FEE2E2" font-size="10">thrashes here</text>
  <rect x="835" y="290" width="70" height="14" rx="3" fill="rgba(0,0,0,0.25)"/>
  <text x="870" y="301" text-anchor="middle" fill="#FCA5A5" font-size="9">B = 4 MB!</text>

  <!-- Footer -->
  <text x="470" y="368" text-anchor="middle" fill="#334155" font-size="10">N=1024: B matrix is ~4 MB — exceeds L1+L2, naive approach constantly evicts and reloads cache lines</text>
</svg>
