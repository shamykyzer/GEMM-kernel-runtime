<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="redFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E11D48" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E11D48" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="purpleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="900" height="420" rx="12" fill="#0F172A"/>
  <text x="450" y="35" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Thread Scaling (N=1024)</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748B" font-size="11">GFLOPS vs thread count. Parallel+AVX-512 peaks at 440 GFLOPS (18 threads).</text>

  <!-- Chart area: x=100..820, y=80..340 -->
  <!-- Y axis: 0 to 460 GFLOPS -->
  <!-- Scale: 260px / 460 = 0.5652px per GFLOP -->
  <!-- y = 340 - (gflops * 0.5652) -->

  <!-- Grid lines -->
  <line x1="100" y1="340" x2="820" y2="340" stroke="#334155" stroke-width="1"/>
  <line x1="100" y1="275" x2="820" y2="275" stroke="#1E293B" stroke-width="1"/>
  <line x1="100" y1="210" x2="820" y2="210" stroke="#1E293B" stroke-width="1"/>
  <line x1="100" y1="145" x2="820" y2="145" stroke="#1E293B" stroke-width="1"/>
  <line x1="100" y1="80" x2="820" y2="80" stroke="#1E293B" stroke-width="1"/>

  <!-- Y axis labels (0, 115, 230, 345, 460) -->
  <text x="90" y="344" text-anchor="end" fill="#64748B" font-size="10">0</text>
  <text x="90" y="279" text-anchor="end" fill="#64748B" font-size="10">115</text>
  <text x="90" y="214" text-anchor="end" fill="#64748B" font-size="10">230</text>
  <text x="90" y="149" text-anchor="end" fill="#64748B" font-size="10">345</text>
  <text x="90" y="84" text-anchor="end" fill="#64748B" font-size="10">460</text>

  <!-- Y axis title -->
  <text x="25" y="210" text-anchor="middle" fill="#94A3B8" font-size="11" transform="rotate(-90 25 210)">GFLOPS</text>

  <!-- X axis positions: 1=140, 2=240, 4=340, 8=440, 16=540, 18=640, 20=740 -->
  <text x="140" y="358" text-anchor="middle" fill="#64748B" font-size="11">1</text>
  <text x="240" y="358" text-anchor="middle" fill="#64748B" font-size="11">2</text>
  <text x="340" y="358" text-anchor="middle" fill="#64748B" font-size="11">4</text>
  <text x="440" y="358" text-anchor="middle" fill="#64748B" font-size="11">8</text>
  <text x="540" y="358" text-anchor="middle" fill="#64748B" font-size="11">16</text>
  <text x="640" y="358" text-anchor="middle" fill="#64748B" font-size="11">18</text>
  <text x="740" y="358" text-anchor="middle" fill="#64748B" font-size="11">20</text>

  <!-- X axis title -->
  <text x="450" y="385" text-anchor="middle" fill="#94A3B8" font-size="11">Threads</text>

  <!-- Parallel+AVX-512 (bs=64): 62.23, 105.71, 153.43, 191.43, 391.27, 439.78, 380.99 -->
  <!-- y: 305, 280, 253, 232, 119, 91, 125 -->

  <polygon points="140,305 240,280 340,253 440,232 540,119 640,91 740,125 740,340 140,340"
           fill="url(#redFill)"/>
  <polyline points="140,305 240,280 340,253 440,232 540,119 640,91 740,125"
            fill="none" stroke="#E11D48" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="140" cy="305" r="5" fill="#E11D48" stroke="#0F172A" stroke-width="2"/>
  <circle cx="240" cy="280" r="5" fill="#E11D48" stroke="#0F172A" stroke-width="2"/>
  <circle cx="340" cy="253" r="5" fill="#E11D48" stroke="#0F172A" stroke-width="2"/>
  <circle cx="440" cy="232" r="5" fill="#E11D48" stroke="#0F172A" stroke-width="2"/>
  <circle cx="540" cy="119" r="5" fill="#E11D48" stroke="#0F172A" stroke-width="2"/>
  <circle cx="640" cy="91" r="5" fill="#E11D48" stroke="#0F172A" stroke-width="2"/>
  <circle cx="740" cy="125" r="5" fill="#E11D48" stroke="#0F172A" stroke-width="2"/>
  <text x="140" y="297" text-anchor="middle" fill="#FFC7D2" font-size="9">62.2</text>
  <text x="240" y="272" text-anchor="middle" fill="#FFC7D2" font-size="9">105.7</text>
  <text x="340" y="245" text-anchor="middle" fill="#FFC7D2" font-size="9">153.4</text>
  <text x="440" y="224" text-anchor="middle" fill="#FFC7D2" font-size="9">191.4</text>
  <text x="540" y="111" text-anchor="middle" fill="#FFC7D2" font-size="9">391.3</text>
  <text x="640" y="83" text-anchor="middle" fill="#FFC7D2" font-size="9">439.8</text>
  <text x="740" y="117" text-anchor="middle" fill="#FFC7D2" font-size="9">381.0</text>

  <!-- Parallel+SIMD (bs=64): 32.84, 54.89, 92.02, 153.49, 238.86, 256.61, 192.48 -->
  <!-- y: 321, 309, 288, 253, 205, 195, 231 -->

  <polygon points="140,321 240,309 340,288 440,253 540,205 640,195 740,231 740,340 140,340"
           fill="url(#purpleFill)"/>
  <polyline points="140,321 240,309 340,288 440,253 540,205 640,195 740,231"
            fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="140" cy="321" r="4" fill="#8B5CF6" stroke="#0F172A" stroke-width="2"/>
  <circle cx="240" cy="309" r="4" fill="#8B5CF6" stroke="#0F172A" stroke-width="2"/>
  <circle cx="340" cy="288" r="4" fill="#8B5CF6" stroke="#0F172A" stroke-width="2"/>
  <circle cx="440" cy="253" r="4" fill="#8B5CF6" stroke="#0F172A" stroke-width="2"/>
  <circle cx="540" cy="205" r="4" fill="#8B5CF6" stroke="#0F172A" stroke-width="2"/>
  <circle cx="640" cy="195" r="4" fill="#8B5CF6" stroke="#0F172A" stroke-width="2"/>
  <circle cx="740" cy="231" r="4" fill="#8B5CF6" stroke="#0F172A" stroke-width="2"/>
  <text x="140" y="336" text-anchor="middle" fill="#C4B5FD" font-size="9">32.8</text>
  <text x="240" y="324" text-anchor="middle" fill="#C4B5FD" font-size="9">54.9</text>
  <text x="340" y="303" text-anchor="middle" fill="#C4B5FD" font-size="9">92.0</text>
  <text x="440" y="268" text-anchor="middle" fill="#C4B5FD" font-size="9">153.5</text>
  <text x="540" y="220" text-anchor="middle" fill="#C4B5FD" font-size="9">238.9</text>
  <text x="640" y="210" text-anchor="middle" fill="#C4B5FD" font-size="9">256.6</text>
  <text x="740" y="246" text-anchor="middle" fill="#C4B5FD" font-size="9">192.5</text>

  <!-- Parallel (scalar, bs=16): 3.25, 6.09, 9.91, 14.27, 18.42, 17.65, 14.59 -->
  <!-- y: 338, 337, 334, 332, 330, 330, 332 -->

  <polygon points="140,338 240,337 340,334 440,332 540,330 640,330 740,332 740,340 140,340"
           fill="url(#greenFill)"/>
  <polyline points="140,338 240,337 340,334 440,332 540,330 640,330 740,332"
            fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="140" cy="338" r="3" fill="#22C55E" stroke="#0F172A" stroke-width="2"/>
  <circle cx="240" cy="337" r="3" fill="#22C55E" stroke="#0F172A" stroke-width="2"/>
  <circle cx="340" cy="334" r="3" fill="#22C55E" stroke="#0F172A" stroke-width="2"/>
  <circle cx="440" cy="332" r="3" fill="#22C55E" stroke="#0F172A" stroke-width="2"/>
  <circle cx="540" cy="330" r="3" fill="#22C55E" stroke="#0F172A" stroke-width="2"/>
  <circle cx="640" cy="330" r="3" fill="#22C55E" stroke="#0F172A" stroke-width="2"/>
  <circle cx="740" cy="332" r="3" fill="#22C55E" stroke="#0F172A" stroke-width="2"/>

  <!-- Legend -->
  <rect x="220" y="64" width="12" height="12" rx="3" fill="#E11D48"/>
  <text x="237" y="75" fill="#FFC7D2" font-size="11">Parallel+AVX-512</text>
  <rect x="380" y="64" width="12" height="12" rx="3" fill="#8B5CF6"/>
  <text x="397" y="75" fill="#C4B5FD" font-size="11">Parallel+SIMD</text>
  <rect x="520" y="64" width="12" height="12" rx="3" fill="#22C55E"/>
  <text x="537" y="75" fill="#86EFAC" font-size="11">Parallel (scalar)</text>

  <!-- Peak annotation -->
  <rect x="640" y="72" width="95" height="18" rx="4" fill="#1E293B" stroke="#E11D48" stroke-width="1"/>
  <text x="687" y="85" text-anchor="middle" fill="#FFC7D2" font-size="10" font-weight="600">peak: 18t</text>
</svg>
